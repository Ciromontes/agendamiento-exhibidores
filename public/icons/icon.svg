<!--
  public/icons/icon.svg — Ícono PWA de Exhibidores (Fase 9B)
  ─────────────────────────────────────────────────────────────
  Ícono vectorial escalable para la PWA.
  Color principal: #4f46e5 (indigo-600, igual que el header de la app).
  Se usa en Android Chrome y como fuente para convertir a PNG.

  Para generar los PNG requeridos por el manifest (192×192 y 512×512),
  se puede usar: https://squoosh.app/ o `sharp` en Node.js.
  ─────────────────────────────────────────────────────────────
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo redondeado con color indigo -->
  <rect width="512" height="512" rx="96" fill="#4f46e5"/>

  <!-- Icono de "tabla de horarios" simplificado -->
  <!-- Cuadro exterior -->
  <rect x="96" y="96" width="320" height="320" rx="24" fill="none"
        stroke="white" stroke-width="24"/>

  <!-- Línea cabecera -->
  <rect x="96" y="96" width="320" height="72" rx="24" fill="white" opacity="0.25"/>

  <!-- Líneas de grilla horizontales -->
  <line x1="120" y1="220" x2="392" y2="220" stroke="white" stroke-width="14" opacity="0.5"/>
  <line x1="120" y1="290" x2="392" y2="290" stroke="white" stroke-width="14" opacity="0.5"/>
  <line x1="120" y1="360" x2="392" y2="360" stroke="white" stroke-width="14" opacity="0.5"/>

  <!-- Línea vertical separando horas de días -->
  <line x1="176" y1="167" x2="176" y2="415" stroke="white" stroke-width="14" opacity="0.5"/>

  <!-- Puntos de reserva (simulan celdas marcadas) -->
  <rect x="198" y="234" width="48" height="42" rx="8" fill="white" opacity="0.9"/>
  <rect x="282" y="304" width="48" height="42" rx="8" fill="white" opacity="0.7"/>
  <rect x="312" y="234" width="48" height="42" rx="8" fill="white" opacity="0.5"/>
</svg>
